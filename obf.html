
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Obfustractor V3 | Enterprise Protection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --bg-dark: #050505;
            --rose-accent: #e11d48;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-dark);
            color: #cbd5e1;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .cosmic-glow {
            box-shadow: 0 0 40px rgba(225, 29, 72, 0.15);
        }

        .terminal-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 0 25px rgba(225, 29, 72, 0.4);
        }

        .glass-panel {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(225, 29, 72, 0.1);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="border-b border-rose-950/30 glass-panel sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 rounded-xl btn-gradient flex items-center justify-center border border-rose-400/20">
                    <i class="fa-solid fa-bolt text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white tracking-tighter uppercase italic">
                        Cosmic <span class="text-rose-500">V3</span>
                    </h1>
                    <p class="text-[10px] text-rose-300/60 font-mono tracking-[0.2em] uppercase">Control Flow Matrix Active</p>
                </div>
            </div>
            <div class="hidden md:flex items-center space-x-3 text-[11px] font-mono px-4 py-2 rounded-lg bg-rose-950/20 border border-rose-900/40 text-rose-400">
                <i class="fa-solid fa-shield-halved animate-pulse-slow"></i>
                <span class="tracking-widest">ENTERPRISE CORE V3.0.1</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-2 gap-10">
        
        <!-- Left: Input Sector -->
        <div class="flex flex-col space-y-5">
            <div class="flex items-center justify-between">
                <h2 class="text-xs font-bold text-slate-400 tracking-[0.3em] flex items-center uppercase">
                    <i class="fa-solid fa-file-code mr-2 text-rose-500"></i>
                    Input Payload
                </h2>
                <button onclick="clearAll()" class="text-[10px] font-bold text-slate-500 hover:text-rose-400 transition-colors uppercase tracking-widest">
                    <i class="fa-solid fa-trash-can mr-1"></i> Wipe Memory
                </button>
            </div>

            <div id="drop-zone" class="relative group flex-grow min-h-[500px] flex flex-col rounded-2xl overflow-hidden border-2 border-slate-800/80 bg-[#0a0a0f] transition-all duration-500 hover:border-rose-900/50">
                <textarea id="input-code" 
                    class="w-full h-full min-h-[500px] p-8 bg-transparent border-none outline-none resize-none font-mono text-sm text-slate-300 placeholder-slate-700 focus:ring-0 leading-relaxed"
                    placeholder="-- Paste your $10k code here..."
                    spellcheck="false"></textarea>
                
                <div id="upload-overlay" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
                    <div class="w-20 h-20 rounded-full bg-slate-900/50 border border-slate-800 flex items-center justify-center mb-6">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-600"></i>
                    </div>
                </div>
            </div>

            <div class="flex gap-4">
                <input type="file" id="file-input" accept=".lua,.txt" class="hidden">
                <button onclick="document.getElementById('file-input').click()" class="flex-1 py-4 rounded-xl border border-slate-800 bg-slate-900 text-slate-300 font-bold text-xs tracking-widest uppercase hover:bg-slate-800 transition-all">
                    Load Local
                </button>
                <button id="obf-btn" onclick="runObfuscation()" class="flex-[2] py-4 rounded-xl btn-gradient text-white font-black text-xs tracking-[0.2em] uppercase shadow-lg shadow-rose-900/20 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-microchip mr-2"></i> Initiate Obfuscation
                </button>
            </div>
        </div>

        <!-- Right: Output Sector -->
        <div class="flex flex-col space-y-5">
            <h2 class="text-xs font-bold text-slate-400 tracking-[0.3em] flex items-center uppercase">
                <i class="fa-solid fa-lock mr-2 text-emerald-500"></i>
                Secure Artifact
            </h2>

            <div class="flex-grow min-h-[350px] flex flex-col rounded-2xl overflow-hidden border border-slate-800 bg-[#0a0a0f] relative">
                <textarea id="output-code" readonly
                    class="w-full h-full min-h-[350px] p-8 bg-transparent border-none outline-none resize-none font-mono text-[10px] text-rose-400/70 focus:ring-0 leading-relaxed"
                    placeholder="Awaiting artifact..."></textarea>
            </div>

            <!-- Terminal -->
            <div id="terminal" class="h-40 bg-black/50 border border-slate-800/80 rounded-2xl p-5 font-mono text-[10px] overflow-y-auto terminal-scroll flex flex-col space-y-2">
                <span class="text-slate-600 tracking-widest uppercase">[ SYSTEM STANDBY ]</span>
            </div>

            <button id="dl-btn" onclick="downloadOutput()" disabled class="w-full py-5 rounded-xl font-black text-xs tracking-[0.2em] uppercase transition-all flex items-center justify-center bg-white text-black hover:bg-slate-200 disabled:opacity-30 disabled:cursor-not-allowed">
                <i class="fa-solid fa-download mr-2 text-rose-600"></i> Export Protected .txt
            </button>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto px-6 py-10 border-t border-slate-900 mt-10">
        <p class="text-center text-[10px] text-slate-600 font-mono tracking-widest uppercase">
            &copy; 2024 Cosmic Security Systems | Polymorphic Encryption Protocol V3
        </p>
    </footer>

    <script>
        const inputArea = document.getElementById('input-code');
        const outputArea = document.getElementById('output-code');
        const terminal = document.getElementById('terminal');
        const obfBtn = document.getElementById('obf-btn');
        const dlBtn = document.getElementById('dl-btn');
        const fileInput = document.getElementById('file-input');

        function addLog(msg, color = 'text-emerald-500/80') {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const log = document.createElement('span');
            log.className = color;
            log.innerHTML = `<span class="text-slate-700 mr-2">[${time}]</span> ${msg}`;
            terminal.appendChild(log);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearAll() {
            inputArea.value = '';
            outputArea.value = '';
            terminal.innerHTML = '<span class="text-slate-600 uppercase tracking-widest">[ SYSTEM PURGED ]</span>';
            dlBtn.disabled = true;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => inputArea.value = e.target.result;
            reader.readAsText(file);
        });

        function generateOpaqueName(length = 16) {
            const chars = ['I', 'l', 'O', '0'];
            let result = chars[Math.floor(Math.random() * 2)];
            for (let i = 1; i < length; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            return '_' + result;
        }

        function runObfuscation() {
            const code = inputArea.value.trim();
            if (!code) return;

            obfBtn.disabled = true;
            addLog("INITIATING COSMIC V3 SECURE PACKER...", "text-rose-500");

            setTimeout(() => {
                addLog("Analyzing code structural entropy...");
                addLog("Injecting Polymorphic CFF States...");
                
                const key = Math.floor(Math.random() * 200) + 20;
                const chunkSize = Math.floor(Math.random() * 30) + 20;
                const chunks = [];
                let currentChunk = [];
                
                for (let i = 0; i < code.length; i++) {
                    let mutated = (code.charCodeAt(i) ^ key) + 5;
                    currentChunk.push(mutated);
                    if (currentChunk.length >= chunkSize || i === code.length - 1) {
                        chunks.push(`{${currentChunk.join(',')}}`);
                        currentChunk = [];
                    }
                }
                
                addLog(`Payload fragmented into ${chunks.length} memory blocks.`);

                const v = {
                    state: generateOpaqueName(),
                    chunks: generateOpaqueName(),
                    buffer: generateOpaqueName(),
                    idx: generateOpaqueName(),
                    chunkIdx: generateOpaqueName(),
                    byteIdx: generateOpaqueName(),
                    env: generateOpaqueName(),
                    concat: generateOpaqueName(),
                    char: generateOpaqueName(),
                    pcall: generateOpaqueName(),
                    load: generateOpaqueName(),
                    str1: generateOpaqueName(),
                    str2: generateOpaqueName(),
                    success: generateOpaqueName(),
                    err: generateOpaqueName(),
                    tamper: generateOpaqueName()
                };

                const s_init = 100 + Math.floor(Math.random() * 100);
                const s_decode = s_init + 50;
                const s_env = s_decode + 50;
                const s_exec = s_env + 50;
                const s_trap = s_exec + 50;

                const out = `--[[ COSMIC V3 ENCRYPTION ENGINE ]]--
local ${v.state} = ${s_init}
local ${v.chunks}, ${v.buffer}, ${v.env}, ${v.concat}, ${v.char}, ${v.pcall}, ${v.load}
while true do
    if ${v.state} == ${s_init} then
        ${v.chunks} = { ${chunks.join(',\n            ')} }
        ${v.buffer} = {}
        ${v.char} = string.char
        ${v.concat} = table.concat
        ${v.state} = ${s_decode}
    elseif ${v.state} == ${s_trap} then
        local ${v.tamper} = debug and debug.getinfo and debug.getinfo(1).currentline or 0
        if ${v.tamper} > 100 then while true do end end
        ${v.state} = ${s_exec}
    elseif ${v.state} == ${s_decode} then
        local ${v.idx} = 1
        for ${v.chunkIdx} = 1, #${v.chunks} do
            for ${v.byteIdx} = 1, #${v.chunks}[${v.chunkIdx}] do
                local bx = ${v.chunks}[${v.chunkIdx}][${v.byteIdx}] - 5
                local res, p, k = 0, 1, ${key}
                while bx > 0 and k > 0 do
                    local r1, r2 = bx % 2, k % 2
                    if r1 ~= r2 then res = res + p end
                    bx, k, p = (bx-r1)/2, (k-r2)/2, p*2
                end
                if bx < k then bx = k end
                while bx > 0 do
                    local r1 = bx % 2
                    if r1 > 0 then res = res + p end
                    bx, p = (bx-r1)/2, p*2
                end
                ${v.buffer}[${v.idx}] = ${v.char}(res)
                ${v.idx} = ${v.idx} + 1
            end
        end
        ${v.state} = ${s_env}
    elseif ${v.state} == ${s_env} then
        local g = _G or _ENV
        if getfenv then g = getfenv() end
        ${v.pcall} = pcall
        ${v.load} = g["\\108\\111\\97\\100\\115\\116\\114\\105\\110\\103"] or g["\\108\\111\\97\\100"]
        ${v.state} = ${s_trap}
    elseif ${v.state} == ${s_exec} then
        if type(${v.load}) == "function" then
            local ${v.success}, ${v.err} = ${v.pcall}(${v.load}(${v.concat}(${v.buffer})))
            if not ${v.success} then while true do end end
        end
        break
    end
end`;

                outputArea.value = out;
                addLog("OBFUSCATION SUCCESSFUL.", "text-emerald-400 font-bold");
                obfBtn.disabled = false;
                dlBtn.disabled = false;
            }, 1200);
        }

        function downloadOutput() {
            const blob = new Blob([outputArea.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cosmic_protected_v3.txt';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
